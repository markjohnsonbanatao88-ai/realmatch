name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies (reproducible)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Generate typecheck report
        run: npm run typecheck > typecheck-report.txt 2>&1 || true

      - name: Upload typecheck report
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-report
          path: typecheck-report.txt
          retention-days: 1

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Dependency audit (blocking)
        run: npm run audit:high
