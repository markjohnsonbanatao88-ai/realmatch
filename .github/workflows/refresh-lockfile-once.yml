name: Refresh lockfile once

on:
  push:
    branches: [phase-1/production-foundation]

permissions:
  contents: write

jobs:
  refresh:
    if: github.event.head_commit.message != 'chore: refresh lockfile'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: phase-1/production-foundation

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Regenerate lockfile for the upgraded dependency baseline
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit generated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if git diff --cached --quiet; then
            echo "Lockfile is already current."
            exit 0
          fi
          git commit -m "chore: refresh lockfile"
          git push origin HEAD:phase-1/production-foundation
